<link rel="stylesheet" href="css/style.css">

<body>

<header class="app-header">
  <div class="app-header-inner">
    <div class="app-title">
      <span class="app-title-kanji">九州</span>
      <div class="app-title-text">
        <h1>慶生自駕之旅</h1>
        <p>2026.07.12 – 07.17 · 6天5夜</p>
      </div>
    </div>
    <div class="trip-countdown" id="tripCountdown"></div>
  </div>
</header>

<main id="main">
  <!-- 行程 -->
  <section class="view" id="view-itinerary">
    <nav class="day-tabs" id="dayTabs"></nav>
    <div id="dayContent"></div>
  </section>

  <!-- 美食 -->
  <section class="view hidden" id="view-food">
    <div class="food-toolbar">
      <div class="chip-row" id="foodRegionChips"></div>
      <div class="sort-row">
        <span class="sort-label">排序</span>
        <button class="sort-btn active" data-sort="rating">⭐ 評價</button>
        <button class="sort-btn" data-sort="distance">📍 距離</button>
      </div>
      <p class="sort-hint hidden" id="geoHint"></p>
    </div>
    <div id="foodList"></div>
  </section>

  <!-- 購買清單 -->
  <section class="view hidden" id="view-shopping">
    <div id="shoppingContent"></div>
  </section>

  <!-- 資訊 -->
  <section class="view hidden" id="view-info">
    <div id="infoContent"></div>
  </section>
</main>

<nav class="tab-bar">
  <button class="tab-item active" data-view="itinerary">
    <span class="tab-icon">🗓️</span><span class="tab-label">行程</span>
  </button>
  <button class="tab-item" data-view="food">
    <span class="tab-icon">🍱</span><span class="tab-label">美食</span>
  </button>
  <button class="tab-item" data-view="shopping">
    <span class="tab-icon">🛍️</span><span class="tab-label">購物</span>
  </button>
  <button class="tab-item" data-view="info">
    <span class="tab-icon">🎫</span><span class="tab-label">資訊</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
